<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Chameleon Resume Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    
    .admin-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .admin-title-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-soft);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    
    .admin-title h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    .admin-title span {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 400;
    }
    
    .logout-btn {
      padding: 0.625rem 1.25rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .logout-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
    }
    
    .stat-card .label {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    
    .stat-card .value {
      font-size: 1.75rem;
      font-weight: 700;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .users-section {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    
    .section-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .section-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }
    
    .refresh-btn {
      padding: 0.5rem 1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .users-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .users-table th,
    .users-table td {
      padding: 1rem 1.5rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    .users-table th {
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .users-table tr:hover {
      background: var(--bg-surface);
    }
    
    .users-table tr:last-child td {
      border-bottom: none;
    }
    
    .user-email {
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .user-phone {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-family: 'JetBrains Mono', monospace;
    }
    
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    
    .badge-blue {
      background: var(--accent-soft);
      color: var(--accent);
    }
    
    .badge-green {
      background: rgba(118, 185, 0, 0.15);
      color: var(--nvidia-green);
    }
    
    .badge-gray {
      background: var(--bg-raised);
      color: var(--text-secondary);
    }
    
    .date-cell {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    
    .action-btn {
      padding: 0.375rem 0.75rem;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .loading-state,
    .empty-state,
    .error-state {
      padding: 3rem;
      text-align: center;
      color: var(--text-secondary);
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Resume Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .modal-overlay.show {
      display: flex;
    }
    
    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      max-width: 800px;
      width: 100%;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .modal-header h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }
    
    .modal-close {
      width: 32px;
      height: 32px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .modal-close:hover {
      border-color: #ef4444;
      color: #ef4444;
    }
    
    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
    }
    
    .resume-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .resume-item {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
    }
    
    .resume-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    
    .resume-item-title {
      font-weight: 500;
    }
    
    .resume-item-date {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    
    .resume-preview {
      background: white;
      color: #333;
      padding: 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .resume-preview h1,
    .resume-preview h2,
    .resume-preview h3 {
      margin: 0.5rem 0;
    }
    
    .resume-preview p {
      margin: 0.25rem 0;
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  
  <div class="admin-container">
    <div class="admin-header">
      <div class="admin-title">
        <div class="admin-title-icon">🦎</div>
        <div>
          <h1>Admin Dashboard</h1>
          <span>Chameleon Resume Bot — User Management</span>
        </div>
      </div>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Total Users</div>
        <div class="value" id="total-users">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Resumes</div>
        <div class="value" id="total-resumes">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Today's Users</div>
        <div class="value" id="today-users">-</div>
      </div>
    </div>
    
    <div class="users-section">
      <div class="section-header">
        <h2>Registered Users</h2>
        <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
      </div>
      
      <div id="users-content">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>Loading users...</p>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Resume Modal -->
  <div class="modal-overlay" id="resume-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">User Resumes</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="resume-list" id="resume-list"></div>
      </div>
    </div>
  </div>
  
  <script>
    // Background animation
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    const particles = [];
    for (let i = 0; i < 25; i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 2 + 1
      });
    }
    
    function animate() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = 'rgba(79, 156, 255, 0.1)';
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();
    
    // Check auth
    fetch('/api/admin/check', { credentials: 'same-origin' })
      .then(r => r.json())
      .then(data => {
        if (!data.authenticated) {
          window.location.href = '/admin';
        }
      });
    
    // Logout
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin/logout', { 
        method: 'POST',
        credentials: 'same-origin'
      });
      window.location.href = '/admin';
    });
    
    // Load users
    async function loadUsers() {
      const content = document.getElementById('users-content');
      content.innerHTML = `
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>Loading users...</p>
        </div>
      `;
      
      try {
        const response = await fetch('/api/admin/users', { credentials: 'same-origin' });
        
        if (response.status === 401) {
          window.location.href = '/admin';
          return;
        }
        
        const data = await response.json();
        
        if (!data.users || data.users.length === 0) {
          content.innerHTML = `
            <div class="empty-state">
              <p>No users registered yet.</p>
            </div>
          `;
          updateStats(data.users || []);
          return;
        }
        
        updateStats(data.users);
        renderUsersTable(data.users);
      } catch (error) {
        content.innerHTML = `
          <div class="error-state">
            <p>Error loading users. Please try again.</p>
          </div>
        `;
      }
    }
    
    function updateStats(users) {
      document.getElementById('total-users').textContent = users.length;
      
      const totalResumes = users.reduce((sum, u) => sum + (u.resume_count || 0), 0);
      document.getElementById('total-resumes').textContent = totalResumes;
      
      const today = new Date().toDateString();
      const todayUsers = users.filter(u => {
        const regDate = new Date(u.registered_at).toDateString();
        return regDate === today;
      }).length;
      document.getElementById('today-users').textContent = todayUsers;
    }
    
    function renderUsersTable(users) {
      const content = document.getElementById('users-content');
      
      const rows = users.map(user => {
        const regDate = new Date(user.registered_at).toLocaleDateString();
        const lastActive = new Date(user.last_active).toLocaleString();
        const resumeCount = user.resume_count || 0;
        
        return `
          <tr>
            <td>
              <div class="user-email">${escapeHtml(user.email)}</div>
            </td>
            <td>
              <div class="user-phone">${formatPhone(user.phone)}</div>
            </td>
            <td class="date-cell">${regDate}</td>
            <td>
              <span class="badge ${resumeCount > 0 ? 'badge-green' : 'badge-gray'}">
                ${resumeCount} resume${resumeCount !== 1 ? 's' : ''}
              </span>
            </td>
            <td>
              <button class="action-btn" onclick="showResumes('${escapeHtml(user.email)}', ${JSON.stringify(user.resumes || []).replace(/'/g, '&#39;')})">
                View Resumes
              </button>
            </td>
          </tr>
        `;
      }).join('');
      
      content.innerHTML = `
        <table class="users-table">
          <thead>
            <tr>
              <th>Email</th>
              <th>Phone</th>
              <th>Registered</th>
              <th>Resumes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatPhone(phone) {
      if (!phone) return '-';
      const digits = phone.replace(/\D/g, '');
      if (digits.length === 10) {
        return `+91 ${digits.slice(0, 5)} ${digits.slice(5)}`;
      }
      return phone;
    }
    
    // Modal functions
    window.showResumes = function(email, resumes) {
      const modal = document.getElementById('resume-modal');
      const title = document.getElementById('modal-title');
      const list = document.getElementById('resume-list');
      
      title.textContent = `Resumes for ${email}`;
      
      if (!resumes || resumes.length === 0) {
        list.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">No resumes generated yet.</p>';
      } else {
        list.innerHTML = resumes.map(resume => {
          const date = new Date(resume.timestamp).toLocaleString();
          const position = resume.target_position || 'Unknown Position';
          const city = resume.target_city || 'Unknown City';
          const theme = resume.theme || 'modern';
          
          return `
            <div class="resume-item">
              <div class="resume-item-header">
                <div>
                  <div class="resume-item-title">${escapeHtml(position)}</div>
                  <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;">
                    ${escapeHtml(city)} • Theme: ${theme} • ${date}
                  </div>
                </div>
                <span class="badge badge-blue">${resume.type || 'generation'}</span>
              </div>
              <div class="resume-preview">
                ${marked.parse(resume.resume_markdown || 'No content')}
              </div>
            </div>
          `;
        }).join('');
      }
      
      modal.classList.add('show');
    };
    
    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('resume-modal').classList.remove('show');
    });
    
    document.getElementById('resume-modal').addEventListener('click', (e) => {
      if (e.target.id === 'resume-modal') {
        document.getElementById('resume-modal').classList.remove('show');
      }
    });
    
    // Refresh button
    document.getElementById('refresh-btn').addEventListener('click', loadUsers);
    
    // Initial load
    loadUsers();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
