<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — Chameleon Resume Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .landing-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    
    .landing-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 3rem;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow-panel);
      text-align: center;
    }
    
    .landing-logo {
      font-size: 4rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 20px rgba(79,156,255,0.5));
      animation: chameleon-pulse 3s ease-in-out infinite;
    }
    
    @keyframes chameleon-pulse {
      0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 12px rgba(79,156,255,0.5)); }
      50% { transform: scale(1.08) rotate(-5deg); filter: drop-shadow(0 0 20px rgba(168,85,247,0.7)); }
    }
    
    .landing-title {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .landing-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    
    .form-group {
      text-align: left;
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    
    .form-group label .required {
      color: #ef4444;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    
    .form-group input.error {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }
    
    .error-message {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.375rem;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent-grad);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: var(--glow-accent);
    }
    
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .submit-btn .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    
    .submit-btn.loading .spinner {
      display: block;
    }
    
    .submit-btn.loading .btn-text {
      display: none;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .global-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 0.875rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .global-error.show {
      display: block;
    }
    
    .features {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    
    .feature {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    
    .feature-icon {
      font-size: 1.1rem;
    }
    
    .admin-link {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    
    .admin-link:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  
  <div class="landing-container">
    <div class="landing-card">
      <div class="landing-logo">🦎</div>
      <h1 class="landing-title">Chameleon Resume Bot</h1>
      <p class="landing-subtitle">AI-Powered ATS Resume Generator<br>Enter your details to get started</p>
      
      <div class="global-error" id="global-error"></div>
      
      <form id="user-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" placeholder="you@example.com" required>
          <div class="error-message" id="email-error">Please enter a valid email address</div>
        </div>
        
        <div class="form-group">
          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="9876543210 or +91 9876543210" required>
          <div class="error-message" id="phone-error">Please enter a valid 10-digit phone number</div>
        </div>
        
        <button type="submit" class="submit-btn" id="submit-btn">
          <span class="spinner"></span>
          <span class="btn-text">Continue to Resume Generator →</span>
        </button>
      </form>
      
      <div class="features">
        <div class="feature">
          <span class="feature-icon">🎯</span>
          <span>ATS Optimized</span>
        </div>
        <div class="feature">
          <span class="feature-icon">🤖</span>
          <span>AI-Powered</span>
        </div>
        <div class="feature">
          <span class="feature-icon">⚡</span>
          <span>Instant Results</span>
        </div>
        <div class="feature">
          <span class="feature-icon">🔒</span>
          <span>Secure Storage</span>
        </div>
      </div>
    </div>
    
    <a href="/admin" class="admin-link">Admin Panel</a>
  </div>
  
  <script>
    // Background animation (simplified from main app)
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    // Simple particle system
    const particles = [];
    for (let i = 0; i < 30; i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        size: Math.random() * 2 + 1
      });
    }
    
    function animate() {
      ctx.clearRect(0, 0, width, height);
      
      // Draw particles
      ctx.fillStyle = 'rgba(79, 156, 255, 0.15)';
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        
        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      
      requestAnimationFrame(animate);
    }
    animate();
    
    // Form handling
    const form = document.getElementById('user-form');
    const emailInput = document.getElementById('email');
    const phoneInput = document.getElementById('phone');
    const submitBtn = document.getElementById('submit-btn');
    const globalError = document.getElementById('global-error');
    
    const emailError = document.getElementById('email-error');
    const phoneError = document.getElementById('phone-error');
    
    // Validation functions
    function validateEmail(email) {
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return regex.test(email);
    }
    
    function validatePhone(phone) {
      const digits = phone.replace(/\D/g, '');
      return digits.length === 10 || (digits.length === 12 && digits.startsWith('91'));
    }
    
    function showFieldError(input, errorEl, show) {
      if (show) {
        input.classList.add('error');
        errorEl.classList.add('show');
      } else {
        input.classList.remove('error');
        errorEl.classList.remove('show');
      }
    }
    
    function showGlobalError(message) {
      globalError.textContent = message;
      globalError.classList.add('show');
    }
    
    function hideGlobalError() {
      globalError.classList.remove('show');
    }
    
    // Real-time validation
    emailInput.addEventListener('blur', () => {
      if (emailInput.value) {
        showFieldError(emailInput, emailError, !validateEmail(emailInput.value));
      }
    });
    
    emailInput.addEventListener('input', () => {
      if (emailInput.classList.contains('error')) {
        showFieldError(emailInput, emailError, !validateEmail(emailInput.value));
      }
    });
    
    phoneInput.addEventListener('blur', () => {
      if (phoneInput.value) {
        showFieldError(phoneInput, phoneError, !validatePhone(phoneInput.value));
      }
    });
    
    phoneInput.addEventListener('input', () => {
      if (phoneInput.classList.contains('error')) {
        showFieldError(phoneInput, phoneError, !validatePhone(phoneInput.value));
      }
    });
    
    // Form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideGlobalError();
      
      const email = emailInput.value.trim();
      const phone = phoneInput.value.trim();
      
      // Validate
      const isEmailValid = validateEmail(email);
      const isPhoneValid = validatePhone(phone);
      
      showFieldError(emailInput, emailError, !isEmailValid);
      showFieldError(phoneInput, phoneError, !isPhoneValid);
      
      if (!isEmailValid || !isPhoneValid) {
        return;
      }
      
      // Show loading state
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      
      try {
        const response = await fetch('/api/register-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, phone })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          // Store email in localStorage
          localStorage.setItem('user_email', email);
          localStorage.setItem('user_phone', phone);
          
          // Redirect to main generator
          window.location.href = '/generator';
        } else {
          showGlobalError(data.detail || 'Registration failed. Please try again.');
        }
      } catch (error) {
        showGlobalError('Network error. Please check your connection and try again.');
        console.error('Registration error:', error);
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });
    
    // Check if already registered (redirect if email exists)
    const existingEmail = localStorage.getItem('user_email');
    if (existingEmail) {
      // Auto-fill for convenience
      emailInput.value = existingEmail;
    }
  </script>
</body>
</html>
