<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Taylor Singh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap');

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .name {
            font-family: 'Montserrat', sans-serif;
            font-size: 44px;
            font-weight: 800;
            color: #1e3c72;
        }

        .header-stats {
            display: flex;
            gap: 30px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #2a5298;
        }

        .stat-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .title {
            font-size: 18px;
            color: #666;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .contact {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 13px;
        }

        .contact a {
            color: #2a5298;
            text-decoration: none;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #1e3c72;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 3px solid #2a5298;
        }

        .entry {
            margin-bottom: 25px;
        }

        .entry:last-child {
            margin-bottom: 0;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .position {
            font-weight: 700;
            color: #1e3c72;
            font-size: 15px;
        }

        .company {
            color: #2a5298;
            font-weight: 600;
            font-size: 14px;
        }

        .date {
            font-size: 12px;
            color: #999;
        }

        .entry-description {
            color: #666;
            font-size: 13px;
            line-height: 1.7;
            margin-top: 8px;
        }

        ul {
            margin-left: 18px;
            margin-top: 8px;
        }

        li {
            margin-bottom: 6px;
            color: #666;
        }

        /* SKILLS VISUALIZATION */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .skill-category {
            margin-bottom: 25px;
        }

        .skill-category-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            color: #1e3c72;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .skill-item {
            margin-bottom: 16px;
        }

        .skill-name {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .skill-label {
            font-weight: 600;
            color: #333;
        }

        .skill-level {
            font-size: 12px;
            color: #999;
            font-weight: 600;
        }

        .skill-bar {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .skill-fill {
            height: 100%;
            background: linear-gradient(90deg, #2a5298 0%, #1e3c72 100%);
            border-radius: 3px;
            transition: width 0.8s ease;
        }

        .experience-timeline {
            position: relative;
            padding-left: 40px;
        }

        .experience-timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #2a5298 0%, #1e3c72 100%);
            border-radius: 3px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #e9ecef;
        }

        .timeline-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -50px;
            top: 5px;
            width: 16px;
            height: 16px;
            background: white;
            border: 3px solid #2a5298;
            border-radius: 50%;
        }

        .proficiency-chart {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 15px;
        }

        .chart-item {
            flex: 1;
            text-align: center;
        }

        .chart-bar {
            height: 120px;
            background: #e9ecef;
            margin-bottom: 8px;
            border-radius: 4px 4px 0 0;
            position: relative;
            overflow: hidden;
        }

        .chart-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(180deg, #2a5298 0%, #1e3c72 100%);
            transition: height 0.6s ease;
        }

        .chart-label {
            font-size: 11px;
            color: #666;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-stats {
                width: 100%;
                justify-content: space-around;
            }

            .name {
                font-size: 32px;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }

            .proficiency-chart {
                flex-wrap: wrap;
            }

            .chart-item {
                min-width: 60px;
            }
        }

        @media print {
            body {
                background: white;
            }

            .section {
                box-shadow: none;
                border: 1px solid #e9ecef;
            }

            header {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <div class="name"></div>
                    <div class="title"></div>
                </div>
            </div>
            <div class="contact"></div>
        </header>
        <section class="section">
            <div class="section-title">Professional Experience</div>
            <div class="experience-timeline">
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="entry">
                        <div class="entry-header">
                            <div>
                                <div class="position"></div>
                                <div class="company"></div>
                            </div>
                            <div class="date"></div>
                        </div>
                        <div class="entry-description">
                            <ul></ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section class="section">
            <div class="section-title">Key Projects</div>
            <div class="experience-timeline">
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="entry">
                        <div class="entry-header">
                            <div>
                                <div class="position"></div>
                                <div class="company"></div>
                            </div>
                            <div class="date"></div>
                        </div>
                        <div class="entry-description">
                            <ul></ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section class="section">
            <div class="section-title">Achievements</div>
            <div class="entry-description">
                <ul></ul>
            </div>
        </section>
        <section class="section">
            <div class="section-title">Core Competencies</div>
            <div class="skills-grid">
                <div class="skill-category">
                    <div class="skill-item">
                        <div class="skill-name">
                            <span class="skill-label"></span>
                        </div>
                        <div class="skill-bar">
                            <div class="skill-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section class="section">
            <div class="section-title">Education</div>
            <div class="entry">
                <div class="entry-header">
                    <div>
                        <div class="position"></div>
                        <div class="company"></div>
                    </div>
                    <div class="date"></div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
