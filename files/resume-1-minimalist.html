<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Sarah Chen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Space+Mono&display=swap');

        body {
            font-family: 'Crimson Text', serif;
            background: #fafaf8;
            color: #2c2c2c;
            line-height: 1.8;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 60px;
        }

        header {
            border-bottom: 1px solid #e0e0de;
            padding-bottom: 40px;
            margin-bottom: 40px;
        }

        .name {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 12px;
            font-family: 'Space Mono', monospace;
        }

        .title {
            font-size: 18px;
            color: #666;
            font-style: italic;
            margin-bottom: 20px;
        }

        .contact {
            font-size: 13px;
            color: #999;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .contact a {
            color: #2c2c2c;
            text-decoration: none;
            border-bottom: 1px dotted #ccc;
        }

        .section {
            margin-bottom: 50px;
        }

        .section-title {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #2c2c2c;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0de;
        }

        .entry {
            margin-bottom: 35px;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .position {
            font-weight: 600;
            font-size: 16px;
        }

        .organization {
            color: #666;
            font-style: italic;
        }

        .date {
            font-size: 13px;
            color: #999;
        }

        .entry-description {
            color: #555;
            font-size: 15px;
            line-height: 1.7;
        }

        ul {
            margin-left: 20px;
            margin-top: 8px;
        }

        li {
            margin-bottom: 6px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .skill-item {
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0de;
        }

        .skill-label {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 6px;
        }

        .skill-value {
            color: #2c2c2c;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px;
            }

            .name {
                font-size: 28px;
            }

            .skills-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .entry-header {
                flex-direction: column;
            }

            .date {
                margin-top: 4px;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .container {
                max-width: 100%;
                box-shadow: none;
                padding: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="name"></div>
            <div class="title"></div>
            <div class="contact"></div>
        </header>

        <section class="section">
            <div class="section-title">Summary</div>
            <div class="entry-description"></div>
        </section>

        <section class="section">
            <div class="section-title">Experience</div>
            <div class="entry">
                <div class="entry-header">
                    <div>
                        <div class="position"></div>
                        <div class="organization"></div>
                    </div>
                    <div class="date"></div>
                </div>
                <div class="entry-description">
                    <ul></ul>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-title">Key Projects</div>
            <div class="entry">
                <div class="entry-header">
                    <div>
                        <div class="position"></div>
                        <div class="organization"></div>
                    </div>
                    <div class="date"></div>
                </div>
                <div class="entry-description">
                    <ul></ul>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-title">Achievements</div>
            <div class="entry-description">
                <ul></ul>
            </div>
        </section>

        <section class="section">
            <div class="section-title">Education</div>
            <div class="entry">
                <div class="entry-header">
                    <div>
                        <div class="position"></div>
                        <div class="organization"></div>
                    </div>
                    <div class="date"></div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-title">Skills</div>
            <div class="skills-grid">
                <div class="skill-item">
                    <div class="skill-label"></div>
                    <div class="skill-value"></div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
