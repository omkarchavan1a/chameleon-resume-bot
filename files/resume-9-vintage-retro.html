<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Chris Valentine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Righteous&family=Courier+Prime:wght@400;700&display=swap');

        body {
            font-family: 'Courier Prime', monospace;
            background: #f4e4c1;
            color: #2d1b00;
            padding: 30px 20px;
            line-height: 1.7;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fef5e7;
            border: 8px solid #d4613d;
            box-shadow: 
                3px 3px 0 #c9391c,
                6px 6px 0 #8b2e1f,
                8px 8px 12px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 4px dashed #d4613d;
        }

        .name {
            font-family: 'Righteous', cursive;
            font-size: 54px;
            color: #d4613d;
            margin-bottom: 8px;
            letter-spacing: 3px;
            text-shadow: 3px 3px 0 #c9391c;
            transform: skew(-5deg);
        }

        .title {
            font-size: 18px;
            color: #2d1b00;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .contact {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 12px;
            border: 2px solid #d4613d;
            padding: 12px;
            background: rgba(212, 97, 61, 0.05);
        }

        .contact-item {
            display: flex;
            align-items: center;
        }

        .contact-item::before {
            content: '●';
            margin-right: 8px;
            color: #d4613d;
            font-size: 16px;
        }

        .contact a {
            color: #2d1b00;
            text-decoration: underline;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-family: 'Righteous', cursive;
            font-size: 28px;
            color: #c9391c;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px 15px;
            background: #d4613d;
            color: #fef5e7;
            border: 3px solid #2d1b00;
            display: inline-block;
            transform: rotate(-2deg);
        }

        .section:nth-child(even) .section-title {
            transform: rotate(2deg);
        }

        .entry {
            margin-bottom: 25px;
            padding-left: 20px;
            border-left: 4px solid #d4613d;
            position: relative;
        }

        .entry::before {
            content: '»';
            position: absolute;
            left: -12px;
            top: 0;
            font-size: 24px;
            color: #d4613d;
        }

        .position {
            font-weight: bold;
            font-size: 14px;
            color: #2d1b00;
            margin-bottom: 4px;
        }

        .organization {
            color: #c9391c;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .date {
            font-size: 11px;
            color: #8b4513;
            margin-bottom: 8px;
            font-style: italic;
        }

        .entry-description {
            color: #2d1b00;
            font-size: 12px;
        }

        ul {
            margin-left: 20px;
            margin-top: 8px;
        }

        li {
            margin-bottom: 6px;
            color: #2d1b00;
        }

        .highlight {
            background: #ffeb3b;
            padding: 2px 4px;
            font-weight: bold;
        }

        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .skill-box {
            background: #fff8dc;
            border: 3px double #d4613d;
            padding: 15px;
            text-align: center;
            transform: rotate(-1deg);
        }

        .skill-box:nth-child(even) {
            transform: rotate(1deg);
        }

        .skill-title {
            font-weight: bold;
            color: #c9391c;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 2px solid #d4613d;
            padding-bottom: 8px;
        }

        .skill-list {
            font-size: 11px;
            color: #2d1b00;
            line-height: 1.8;
        }

        .divider {
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                #d4613d,
                #d4613d 10px,
                transparent 10px,
                transparent 20px
            );
            margin: 30px 0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
                border-width: 6px;
            }

            .name {
                font-size: 36px;
            }

            .contact {
                flex-direction: column;
                gap: 10px;
            }

            .skills-container {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body {
                background: white;
            }

            .container {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="name"></div>
            <div class="title"></div>
            <div class="contact"></div>
        </header>
        <div class="divider"></div>
        <section class="section">
            <div class="section-title">ABOUT</div>
            <p></p>
        </section>
        <section class="section">
            <div class="section-title">EXPERIENCE</div>
            <div class="entry">
                <div class="position"></div>
                <div class="organization"></div>
                <div class="date"></div>
                <div class="entry-description">
                    <ul></ul>
                </div>
            </div>
        </section>
        <section class="section">
            <div class="section-title">KEY PROJECTS</div>
            <div class="entry">
                <div class="position"></div>
                <div class="organization"></div>
                <div class="date"></div>
                <div class="entry-description">
                    <ul></ul>
                </div>
            </div>
        </section>
        <section class="section">
            <div class="section-title">ACHIEVEMENTS</div>
            <div class="entry-description">
                <ul></ul>
            </div>
        </section>
        <section class="section">
            <div class="section-title">EDUCATION</div>
            <div class="entry">
                <div class="position"></div>
                <div class="organization"></div>
                <div class="date"></div>
            </div>
        </section>
        <div class="divider"></div>
        <section class="section">
            <div class="section-title">SKILLS</div>
            <div class="skills-container">
                <div class="skill-box">
                    <div class="skill-title"></div>
                    <div class="skill-list"></div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
