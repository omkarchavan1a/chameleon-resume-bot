<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Morgan Wells</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

        body {
            font-family: 'Sora', sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 40px 20px;
            line-height: 1.7;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .name {
            font-size: 44px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .title {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .contact {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 13px;
        }

        .contact a {
            color: #2563eb;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact a:hover {
            color: #1e40af;
        }

        .section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 30px;
            padding-bottom: 12px;
            border-bottom: 2px solid #2563eb;
            display: inline-block;
        }

        .timeline {
            position: relative;
            padding-left: 40px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, #2563eb 0%, #3b82f6 50%, #93c5fd 100%);
        }

        .entry {
            margin-bottom: 40px;
            position: relative;
        }

        .entry::before {
            content: '';
            position: absolute;
            left: -48px;
            top: 4px;
            width: 16px;
            height: 16px;
            background: #2563eb;
            border: 4px solid #f5f5f5;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .entry:hover::before {
            width: 20px;
            height: 20px;
            left: -52px;
            background: #1e40af;
            box-shadow: 0 0 0 8px rgba(37, 99, 235, 0.1);
        }

        .date {
            font-size: 12px;
            font-weight: 700;
            color: #2563eb;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .position {
            font-size: 17px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .organization {
            font-size: 15px;
            color: #666;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .entry-description {
            color: #555;
            font-size: 14px;
            line-height: 1.8;
        }

        ul {
            margin-left: 20px;
            margin-top: 10px;
        }

        li {
            margin-bottom: 8px;
            color: #666;
        }

        .highlight {
            background: linear-gradient(120deg, #fef08a 0%, #fde047 100%);
            padding: 2px 4px;
            border-radius: 2px;
        }

        .about-section {
            background: white;
            padding: 30px;
            border-radius: 8px;
            border-left: 4px solid #2563eb;
            margin-bottom: 40px;
        }

        .about-section p {
            color: #555;
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .about-section p:last-child {
            margin-bottom: 0;
        }

        .skills-section {
            background: white;
            padding: 30px;
            border-radius: 8px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .skill-item {
            padding-bottom: 15px;
            border-bottom: 1px solid #e5e7eb;
        }

        .skill-label {
            font-size: 12px;
            font-weight: 700;
            color: #2563eb;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .skill-value {
            font-size: 14px;
            color: #555;
        }

        @media (max-width: 768px) {
            .name {
                font-size: 32px;
            }

            .timeline {
                padding-left: 30px;
            }

            .timeline::before {
                left: -8px;
            }

            .entry::before {
                left: -38px;
            }

            .contact {
                flex-direction: column;
                gap: 10px;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body {
                background: white;
            }

            .about-section, .skills-section {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="name"></div>
            <div class="title"></div>
            <div class="contact"></div>
        </header>

        <section class="section">
            <div class="about-section"></div>
        </section>

        <section class="section">
            <div class="section-title">Professional Journey</div>
            <div class="timeline">
                <div class="entry">
                    <div class="date"></div>
                    <div class="position"></div>
                    <div class="organization"></div>
                    <div class="entry-description">
                        <ul></ul>
                    </div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-title">Education</div>
            <div class="timeline">
                <div class="entry">
                    <div class="date"></div>
                    <div class="position"></div>
                    <div class="organization"></div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="skills-section">
                <div class="section-title">Competencies</div>
                <div class="skills-grid">
                    <div class="skill-item">
                        <div class="skill-label"></div>
                        <div class="skill-value"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
